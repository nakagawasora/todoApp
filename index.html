<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5" style="max-width: 540px">
      <h1 class="h4 fw-semibold mb-4">TODO</h1>
      <div class="input-group mb-4">
        <input
          type="text"
          id="titleInput"
          class="form-control"
          placeholder="やることを入力"
        />
        <button class="btn btn-dark" onclick="addTodo()">追加</button>
      </div>
      <ul id="todoList" class="list-group"></ul>
    </div>
    <script>
      const API = "/api/todos";

      async function loadTodos() {
        const todos = await fetch(API).then((r) => r.json());
        const list = document.getElementById("todoList");
        list.innerHTML = "";
        todos.forEach((todo) => {
          const li = document.createElement("li");
          li.className = "list-group-item d-flex align-items-center gap-2";
          li.innerHTML = `
                    <input class="form-check-input me-2" type="checkbox" ${todo.done ? "checked" : ""} onchange="toggleTodo(${todo.id})">
                    <span class="flex-grow-1 ${todo.done ? "text-decoration-line-through text-muted" : ""}">${todo.title}</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteTodo(${todo.id})">×</button>
                `;
          list.appendChild(li);
        });
      }

      async function addTodo() {
        const input = document.getElementById("titleInput");
        const title = input.value.trim();
        if (!title) return;
        await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        input.value = "";
        loadTodos();
      }

      document.getElementById("titleInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTodo();
      });

      async function toggleTodo(id) {
        await fetch(`${API}/${id}`, { method: "PUT" });
        loadTodos();
      }

      async function deleteTodo(id) {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadTodos();
      }

      loadTodos();
    </script>
  </body>
</html>
